name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0 这样的 tag 触发发布
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

env:
  GO_VERSION: '1.22'

jobs:
  # === 跨平台编译 ===
  build-cross-platform:
    name: Build Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build all platforms
        run: bash packaging/build_all.sh ${{ github.event.inputs.version || github.ref_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: samime-binaries
          path: dist/
          retention-days: 30

  # === Linux .deb + .rpm ===
  build-linux-packages:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    needs: build-cross-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm

      - name: Build .deb and .rpm
        run: bash packaging/linux/build_linux_package.sh ${{ github.event.inputs.version || github.ref_name }} all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: samime-linux-packages
          path: packaging/linux/*.deb
          retention-days: 30

  # === Windows NSIS ===
  build-windows-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: build-cross-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Windows package
        run: |
          packaging\windows\build_windows_package.bat
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: samime-windows-installer
          path: packaging/windows/samime-setup-*.exe
          retention-days: 30

  # === macOS .dmg ===
  build-macos-dmg:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: build-cross-platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build macOS package
        run: bash packaging/macos/build_macos_package.sh ${{ github.event.inputs.version || github.ref_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: samime-macos-dmg
          path: packaging/macos/*.dmg
          retention-days: 30

  # === 发布到 GitHub Releases ===
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-cross-platform, build-linux-packages, build-windows-installer, build-macos-dmg]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts/ -type f -exec cp {} release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Samime ${{ github.ref_name }}
          body_path: release/RELEASE_NOTES.md
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
